<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <form action="/login" method="post">
        <input name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button>Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
