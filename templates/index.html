<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .spam { color: red; }
        .notspam { color: lightgreen; }

        canvas {
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE (INPUT) -->
    <div class="box">
        <h2>Spam Detector</h2>

        <form action="/predict" method="post">
            <textarea name="message" placeholder="Enter message..."></textarea>
            <br>
            <button type="submit">Check</button>
        </form>

        {% if result %}
            <h3 class="{{ 'spam' if result=='Spam' else 'notspam' }}">
                {{ result }}
            </h3>
            <p>Confidence: {{ confidence }}%</p>
        {% endif %}

        {% if history %}
            <h4>History</h4>
            <ul>
            {% for msg, res in history %}
                <li>{{ msg }} → {{ res }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    </div>

    <!-- RIGHT SIDE (GRAPH) -->
    <div class="box">
        <h3>Spam Analysis</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
var ctx = document.getElementById('chart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Spam', 'Not Spam'],
        datasets: [{
            label: 'Count',
            data: [{{ spam }}, {{ notspam }}],
        }]
    }
});
</script>

</body>
</html>
