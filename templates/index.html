<h3>📊 Spam Analysis</h3>

<canvas id="myChart" width="300" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
var ctx = document.getElementById('myChart').getContext('2d');

var chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Spam', 'Not Spam'],
        datasets: [{
            label: 'Message Count',
            data: [{{ spam }}, {{ notspam }}],
        }]
    }
});
</script>
