<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .spam {
            color: red;
            font-weight: bold;
        }

        .notspam {
            color: lightgreen;
            font-weight: bold;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- TOP BAR -->
    <div class="top-bar">
        <h3>Spam Detector</h3>
        <a href="/logout">
            <button style="background:red;">Logout</button>
        </a>
    </div>

    <!-- FORM -->
    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter your message..."></textarea><br>
        <button type="submit">Check</button>
    </form>

    <!-- RESULT -->
    {% if result %}
        <h3 class="{{ 'spam' if result=='Spam' else 'notspam' }}">
            Result: {{ result }}
        </h3>
    {% endif %}

</div>

</body>
</html>
