<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
        }

        .spam { color: red; }
        .notspam { color: lightgreen; }
    </style>
</head>

<body>

<div class="box">

    <a href="/logout">
        <button style="background:red;">Logout</button>
    </a>

    <h2>Spam Detector</h2>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter message..."></textarea><br>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <h3 class="{{ 'spam' if result=='Spam' else 'notspam' }}">
            {{ result }}
        </h3>
    {% endif %}

</div>

</body>
</html>
